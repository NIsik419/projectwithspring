services:
  postgres:
    image: postgres:15
    container_name: cafun-postgres
    environment:
      POSTGRES_DB: cafun
      POSTGRES_USER: cafun
      POSTGRES_PASSWORD: cafun
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cafun -d cafun"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
